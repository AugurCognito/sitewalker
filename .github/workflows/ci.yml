name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + typecheck
        run: pnpm check

      - name: Build
        run: pnpm build

# Note: scripts/smoke.sh is a live-network integration check (needs Chrome and
# hits external sites). It is intentionally NOT run in CI — run it locally.
