name: Publish to npm

# OIDC trusted publishing — no npm token stored. Triggered by a GitHub Release.
# One-time bootstrap required first (npm cannot trust-publish a package that does
# not exist yet):
#   1. `npm login` && `npm publish --access public`  (claims the name)
#   2. npmjs.com -> sitestash -> Settings -> Trusted Publisher:
#        repository: AugurCognito/sitestash   workflow: publish.yml
# After that, publishing a GitHub Release runs this workflow with provenance.

on:
  release:
    types: [published]

permissions:
  id-token: write # required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - run: npm publish --provenance --access public
